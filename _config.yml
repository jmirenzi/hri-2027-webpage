# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "HRI 2027 Conference"
email: "jmirenzi@cmu.edu"
description: >- # this means to ignore newlines until "baseurl:"
  The Human-Robot Interaction 2027 Conference website.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
# theme: minima
remote_theme: "DigitaleGesellschaft/jekyll-theme-conference@v3.6.3"
plugins:
  - jekyll-include-cache
  - jekyll-remote-theme

conference:
  lang: "en"
  tz: "+5:00"
  primary_color: '#1a5490'      # Deep blue
  secondary_color: '#2d7ab9'    # Lighter blue
  link_color: '#074'            # Link color
  navigation:
    links:
      - name: Overview
        relative_url: /
      - name: Submissions
        menu:
          - name: Full Papers
            relative_url: /submissions/full-papers/
          - name: Short Papers
            relative_url: /submissions/short-papers/
          - name: Workshops and Tutorials
            relative_url: /submissions/workshops/
          - name: Late Breaking Reports
            relative_url: /submissions/lbr/
      - name: Attending
        menu:
          - name: Registration
            relative_url: /attending/registration/
          - name: Venue Information
            relative_url: /attending/venue/
          - name: Code of Conduct
            relative_url: /attending/code-of-conduct/
      - name: Program
        menu:
          - name: Keynote and Lectures
            relative_url: /program/keynotes/
          - name: Schedule
            relative_url: /program/schedule/
          - name: Awards
            relative_url: /program/awards/
          - name: Industry Day
            relative_url: /program/industry-day/
          - name: Workshops and Tutorials Program
            relative_url: /program/workshops/
      - name: Partners
        relative_url: /partners/
      - name: Organizers
        relative_url: /organizers/



collections:
  talks:
    output: true
    permalink: /:collection/:title/
  speakers:
    output: true
    permalink: /:collection/:title/
  rooms:
    output: true
    permalink: /:collection/:title/

defaults:
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: speakers
    values:
      layout: speaker
  - scope:
      path: ""
      type: rooms
    values:
      layout: room



